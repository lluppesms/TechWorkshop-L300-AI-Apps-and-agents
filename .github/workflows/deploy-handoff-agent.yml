name: Deploy Handoff Agent

on:
  push:
    paths:
      - 'src/app/agents/handoffAgent_initializer.py'
      - 'src/prompts/HandoffAgentPrompt.txt'
      - 'src/services/handoff_service.py'
      - '.github/workflows/deploy-handoff-agent.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run-handoff-initializer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: 'echo "$ENV" > src/.env'
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run handoff agent initializer
        run: |
          cd src/
          python app/agents/handoffAgent_initializer.py
